<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Zalivai — Мои медиафайлы</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #1a1a1a;
      --border:    #2a2a2a;
      --accent:    #2AABEE;
      --text:      #e8e8e8;
      --muted:     #666;
      --radius:    10px;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100%;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: auto;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Шапка ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--muted);
    }

    .user-name { color: var(--text); font-weight: 500; }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: border-color .2s, color .2s;
    }
    .btn-logout:hover { border-color: #555; color: var(--text); }

    /* ── Экран входа ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 56px);
      gap: 24px;
      padding: 40px 20px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }

    .login-card h2 { font-size: 22px; margin-bottom: 8px; }
    .login-card p  { color: var(--muted); font-size: 14px; margin-bottom: 28px; line-height: 1.5; }

    /* ── Вкладки ── */
    #app { display: none; }

    .tabs {
      display: flex;
      gap: 0;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 56px;
      z-index: 95;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      padding: 14px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Фильтры (медиафайлы) ── */
    .filters {
      padding: 16px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 104px;
      z-index: 90;
    }

    .filter-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-sep {
      width: 1px;
      height: 24px;
      background: var(--border);
      align-self: center;
    }

    .chip {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .chip:hover            { border-color: var(--accent); color: var(--text); }
    .chip.active           { background: var(--accent); border-color: var(--accent); color: #fff; }
    .chip.video.active     { background: #a855f7; border-color: #a855f7; }
    .chip.photo.active     { background: #22c55e; border-color: #22c55e; }

    /* ── Статистика ── */
    .stats {
      padding: 10px 20px;
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Сетка медиафайлов ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 2px;
      padding: 2px;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }

    .card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
      border-radius: 4px;
    }

    .card img,
    .card video {
      width: 100%;
      height: auto;
      display: block;
      transition: transform .2s;
    }

    .card:hover img,
    .card:hover video { transform: scale(1.03); }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.75) 0%, transparent 50%);
      opacity: 0;
      transition: opacity .2s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 10px;
    }
    .card:hover .card-overlay { opacity: 1; }

    .card-articul {
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      background: rgba(0,0,0,.4);
      border-radius: 4px;
      padding: 2px 6px;
      align-self: flex-start;
      letter-spacing: .3px;
    }

    .card-name {
      font-size: 11px;
      color: rgba(255,255,255,.7);
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge-video {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,.6);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      color: #fff;
    }

    /* ── Пустой экран ── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .empty p  { font-size: 14px; }

    /* ── Лайтбокс ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overscroll-behavior: contain;
      touch-action: pinch-zoom;
    }
    #lightbox.open { display: flex; }

    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .lightbox-inner img,
    .lightbox-inner video {
      max-width: 90vw;
      max-height: 80vh;
      border-radius: 8px;
      object-fit: contain;
    }

    .lightbox-meta {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }
    .lightbox-meta strong { color: var(--text); }

    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 28px;
      color: #fff;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      opacity: .7;
      transition: opacity .15s;
    }
    .lightbox-close:hover { opacity: 1; }

    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 36px;
      color: #fff;
      cursor: pointer;
      background: rgba(0,0,0,.4);
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: .7;
      transition: opacity .15s, background .15s;
    }
    .lightbox-nav:hover { opacity: 1; background: rgba(0,0,0,.7); }
    #lb-prev { left: 12px; }
    #lb-next { right: 12px; }

    /* ── Loader ── */
    .loader {
      display: flex;
      justify-content: center;
      padding: 60px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Эталоны — список ── */
    .ref-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px;
      max-width: 960px;
      margin: 0 auto;
    }

    .ref-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      gap: 20px;
      padding: 16px;
      align-items: flex-start;
    }

    @media (max-width: 640px) {
      .ref-card { flex-direction: column; }
    }

    /* Два фото рядом */
    .ref-photos {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .ref-photo-wrap {
      width: 120px;
      flex-shrink: 0;
    }

    @media (max-width: 640px) {
      .ref-photo-wrap { width: 100px; }
    }

    .ref-photo-label {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .ref-photo-wrap img {
      width: 100%;
      border-radius: 8px;
      display: block;
      background: #111;
      aspect-ratio: 3/4;
      object-fit: cover;
    }

    .ref-photo-wrap .ref-photo-placeholder {
      width: 100%;
      aspect-ratio: 3/4;
      border-radius: 8px;
      background: #111;
      border: 1px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 11px;
    }

    /* Поля */
    .ref-fields {
      flex: 1;
      min-width: 0;
    }

    .ref-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .ref-articul {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .ref-number {
      font-size: 12px;
      color: var(--muted);
      background: #222;
      border-radius: 4px;
      padding: 2px 7px;
    }

    .ref-date {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
    }

    .ref-field-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 6px 12px;
      align-items: start;
      margin-bottom: 8px;
    }

    .ref-field-label {
      font-size: 12px;
      color: var(--muted);
      padding-top: 5px;
      white-space: nowrap;
    }

    .ref-field-value {
      font-size: 14px;
      color: var(--text);
      padding: 4px 6px;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: text;
      word-break: break-word;
      min-height: 28px;
      transition: border-color .15s, background .15s;
      line-height: 1.4;
    }

    .ref-field-value:hover {
      border-color: var(--border);
      background: #111;
    }

    .ref-field-value.editing {
      border-color: var(--accent);
      background: #111;
      outline: none;
    }

    .ref-field-value[data-multiline="true"] {
      min-height: 60px;
    }

    .ref-field-readonly {
      font-size: 14px;
      color: var(--muted);
      padding: 4px 6px;
    }

    .ref-save-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
    }

    .ref-save-status {
      font-size: 12px;
      margin-top: 6px;
      height: 16px;
    }
    .ref-save-status.ok   { color: #22c55e; }
    .ref-save-status.err  { color: #ef4444; }

    /* ── Кнопка удаления на карточке ── */
    .ref-delete-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 16px;
      line-height: 1;
      transition: color .15s, background .15s;
      flex-shrink: 0;
    }
    .ref-delete-btn:hover { color: #ef4444; background: rgba(239,68,68,.1); }

    /* ── Корзина ── */
    .trash-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      gap: 16px;
      padding: 14px 16px;
      align-items: center;
      opacity: .75;
    }

    .trash-card:hover { opacity: 1; }

    .trash-photo {
      width: 64px;
      height: 80px;
      flex-shrink: 0;
      border-radius: 6px;
      object-fit: cover;
      background: #111;
    }

    .trash-photo-placeholder {
      width: 64px;
      height: 80px;
      flex-shrink: 0;
      border-radius: 6px;
      background: #111;
      border: 1px dashed var(--border);
    }

    .trash-info {
      flex: 1;
      min-width: 0;
    }

    .trash-articul {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .trash-name {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .trash-days {
      display: inline-block;
      margin-top: 8px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(239,68,68,.12);
      color: #ef4444;
    }

    .trash-days.safe { background: rgba(100,100,100,.15); color: var(--muted); }

    .btn-restore {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      white-space: nowrap;
    }
    .btn-restore:hover { border-color: var(--accent); color: var(--accent); }

    .btn-purge {
      flex-shrink: 0;
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
      white-space: nowrap;
    }
    .btn-purge:hover { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,.08); }

    /* ── Admin ── */
    .admin-section {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px;
    }

    .admin-section h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin: 28px 0 12px;
    }
    .admin-section h2:first-child { margin-top: 0; }

    /* Шаблоны */
    .tpl-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .tpl-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .tpl-key {
      font-size: 11px;
      font-family: monospace;
      background: #222;
      border-radius: 4px;
      padding: 2px 7px;
      color: var(--accent);
    }

    .tpl-desc {
      font-size: 13px;
      color: var(--muted);
      flex: 1;
    }

    .tpl-placeholders {
      font-size: 11px;
      color: #888;
      margin-bottom: 8px;
      font-family: monospace;
    }

    .tpl-textarea {
      width: 100%;
      min-height: 80px;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      padding: 8px 10px;
      resize: vertical;
      line-height: 1.5;
      transition: border-color .15s;
    }
    .tpl-textarea:focus { outline: none; border-color: var(--accent); }

    .tpl-sort-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      margin-left: auto;
    }
    .tpl-sort-input {
      width: 62px;
      padding: 2px 6px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #111;
      color: var(--text);
      text-align: center;
      transition: border-color .15s;
    }
    .tpl-sort-input:focus { outline: none; border-color: var(--accent); }

    .tpl-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .btn-save-tpl {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-save-tpl:hover { opacity: .85; }
    .btn-save-tpl:disabled { opacity: .4; cursor: default; }

    .tpl-status {
      font-size: 12px;
      height: 16px;
    }
    .tpl-status.ok  { color: #22c55e; }
    .tpl-status.err { color: #ef4444; }

    /* Списки */
    .list-group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .list-group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
      transition: background .15s;
    }
    .list-group-header:hover { background: #1f1f1f; }
    .list-group-header.open  { border-bottom-color: var(--border); }

    .list-group-key {
      font-size: 12px;
      font-family: monospace;
      color: var(--accent);
      background: #222;
      border-radius: 4px;
      padding: 2px 7px;
    }

    .list-group-count {
      font-size: 12px;
      color: var(--muted);
    }

    .list-group-chevron {
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
      transition: transform .2s;
    }
    .list-group-header.open .list-group-chevron { transform: rotate(90deg); }

    .list-group-body { display: none; padding: 12px 16px; }
    .list-group-body.open { display: block; }

    .list-table { width: 100%; border-collapse: collapse; }

    .list-table th {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
      text-align: left;
      padding: 0 6px 8px;
      font-weight: 500;
    }

    .list-row td { padding: 4px 6px; vertical-align: middle; }

    .list-row.inactive { opacity: .4; }

    .list-input {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 5px;
      color: var(--text);
      font-size: 13px;
      padding: 4px 6px;
      width: 100%;
      transition: border-color .15s, background .15s;
    }
    .list-input:hover  { border-color: var(--border); background: #111; }
    .list-input:focus  { outline: none; border-color: var(--accent); background: #111; }

    .list-toggle {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .btn-del-item {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color .15s;
    }
    .btn-del-item:hover { color: #ef4444; }

    .list-add-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .list-add-input {
      flex: 1;
      min-width: 120px;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 6px 10px;
    }
    .list-add-input:focus { outline: none; border-color: var(--accent); }

    .btn-add-item {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color .15s;
      white-space: nowrap;
    }
    .btn-add-item:hover { border-color: var(--accent); color: var(--accent); }

    .admin-invalidate {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .btn-invalidate {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 18px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-invalidate:hover { border-color: var(--accent); color: var(--accent); }

    .invalidate-hint {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Admin: layout с sidebar ── */
    #tab-admin.active {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 106px);
      overflow: hidden;
    }

    .admin-topbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .btn-sidebar-toggle {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 20px;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
      transition: color .15s, background .15s;
    }
    .btn-sidebar-toggle:hover { color: var(--text); background: #222; }

    .admin-topbar-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .admin-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    .admin-sidebar {
      width: 200px;
      flex-shrink: 0;
      overflow-y: auto;
      border-right: 1px solid var(--border);
      background: var(--surface);
      padding: 12px 0;
      transition: width .22s ease;
    }
    .admin-sidebar.hidden {
      width: 0;
      padding: 0;
      overflow: hidden;
    }

    .admin-nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 16px;
      background: none;
      border: none;
      border-left: 2px solid transparent;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      white-space: nowrap;
      transition: color .15s, background .15s, border-color .15s;
    }
    .admin-nav-btn:hover  { background: #1f1f1f; color: var(--text); }
    .admin-nav-btn.active { color: var(--accent); border-left-color: var(--accent); background: rgba(42,171,238,.06); }

    .admin-main {
      flex: 1;
      overflow-y: auto;
      min-width: 0;
    }

    /* ── Admin: секция пользователей ── */
    .users-section {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .users-search { margin-bottom: 16px; }

    .users-search-input {
      width: 100%;
      max-width: 300px;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 8px 12px;
      transition: border-color .15s;
    }
    .users-search-input:focus { outline: none; border-color: var(--accent); }

    .users-table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .users-table { width: 100%; border-collapse: collapse; }

    .users-table th {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
      font-weight: 500;
      padding: 10px 14px;
      text-align: left;
      background: #1f1f1f;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .users-table td {
      padding: 9px 14px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .users-table tr:last-child td { border-bottom: none; }
    .users-table tbody tr:hover td { background: rgba(255,255,255,.02); }

    .balance-val {
      display: inline-block;
      min-width: 52px;
      padding: 3px 7px;
      border-radius: 5px;
      border: 1px solid transparent;
      cursor: text;
      font-weight: 600;
      color: #f59e0b;
      transition: border-color .15s, background .15s;
    }
    .balance-val:hover   { border-color: var(--border); background: #111; }
    .balance-val.editing { border-color: var(--accent); background: #111; outline: none; }

    .user-status {
      display: inline-block;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 10px;
    }
    .user-status.reg   { background: rgba(34,197,94,.12);   color: #22c55e; }
    .user-status.unreg { background: rgba(100,100,100,.12); color: var(--muted); }

    .user-id-cell { font-family: monospace; font-size: 12px; color: var(--muted); }

    /* ── Блок баннера в карточке сообщения ── */
    .tpl-banner {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
      padding: 10px 12px;
      background: #111;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .tpl-banner-preview {
      height: 44px;
      max-width: 180px;
      border-radius: 4px;
      object-fit: contain;
      background: #0a0a0a;
      flex-shrink: 0;
    }

    .tpl-banner-meta {
      flex: 1;
      min-width: 0;
    }

    .tpl-banner-name {
      display: block;
      font-size: 12px;
      font-family: monospace;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 6px;
    }

    .btn-replace-banner {
      display: inline-block;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 5px;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: border-color .15s, color .15s;
      user-select: none;
    }
    .btn-replace-banner:hover { border-color: var(--accent); color: var(--accent); }

    .banner-upload-status {
      font-size: 11px;
      margin-top: 5px;
      height: 14px;
    }
    .banner-upload-status.ok  { color: #22c55e; }
    .banner-upload-status.err { color: #ef4444; }
  </style>
</head>
<body>

<!-- Шапка -->
<header>
  <div class="logo">📦 Zalivai</div>
  {% if user %}
  <div class="user-info">
    <span>Привет, <span class="user-name">{{ user.first_name }}</span></span>
    <button class="btn-logout" onclick="logout()">Выйти</button>
  </div>
  {% endif %}
</header>

<!-- Экран входа -->
{% if not user %}
<div id="login-screen">
  <div class="login-card">
    <h2>Мои медиафайлы</h2>
    <p>Войдите через Telegram, чтобы просмотреть фото и видео, созданные для ваших артикулов.</p>
    <script
      async
      src="https://telegram.org/js/telegram-widget.js?22"
      data-telegram-login="{{ bot_username }}"
      data-size="large"
      data-onauth="onTelegramAuth(user)"
      data-request-access="write">
    </script>
  </div>
</div>

{% else %}

<!-- Основное приложение -->
<div id="app">

  <!-- Вкладки -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="media" onclick="switchTab('media')">Медиафайлы</button>
    <button class="tab-btn"        data-tab="refs"  onclick="switchTab('refs')">Эталоны</button>
    <button class="tab-btn"        data-tab="trash" id="tab-btn-trash" style="display:none" onclick="switchTab('trash')">Корзина</button>
    {% if is_admin %}
    <button class="tab-btn"        data-tab="admin" onclick="switchTab('admin')" style="margin-left:auto;color:#f59e0b">Администратор</button>
    {% endif %}
  </div>

  <!-- ── Вкладка: Медиафайлы ── -->
  <div id="tab-media" class="tab-panel active">

    <div class="filters">
      <div class="filter-group" id="type-filters">
        <button class="chip active" data-type="all"   onclick="setType(this)">Все</button>
        <button class="chip photo"  data-type="photo" onclick="setType(this)">📷 Фото</button>
        <button class="chip video"  data-type="video" onclick="setType(this)">🎬 Видео</button>
      </div>

      <div class="filter-sep"></div>

      <div class="filter-group" id="articul-filters">
        <button class="chip active" data-articul="all" onclick="setArticul(this)">Все артикулы</button>
      </div>
    </div>

    <div class="stats" id="stats"></div>
    <div id="content">
      <div class="loader"><div class="spinner"></div></div>
    </div>

  </div>

  <!-- ── Вкладка: Эталоны ── -->
  <div id="tab-refs" class="tab-panel">
    <div id="refs-content">
      <div class="loader"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- ── Вкладка: Корзина ── -->
  <div id="tab-trash" class="tab-panel">
    <div id="trash-content">
      <div class="loader"><div class="spinner"></div></div>
    </div>
  </div>

  {% if is_admin %}
  <!-- ── Вкладка: Администратор ── -->
  <div id="tab-admin" class="tab-panel">
    <div class="admin-topbar">
      <button class="btn-sidebar-toggle" onclick="toggleAdminSidebar()" title="Меню">☰</button>
      <span class="admin-topbar-title" id="admin-topbar-title">Промпты</span>
    </div>
    <div class="admin-layout">
      <nav class="admin-sidebar" id="admin-sidebar">
        <button class="admin-nav-btn active" data-section="prompts"  onclick="adminNav('prompts')">✏️ Промпты</button>
        <button class="admin-nav-btn"        data-section="messages" onclick="adminNav('messages')">💬 Сообщения</button>
        <button class="admin-nav-btn"        data-section="users"    onclick="adminNav('users')">👥 Пользователи</button>
      </nav>
      <div class="admin-main">
        <div id="admin-section-prompts">
          <div class="loader"><div class="spinner"></div></div>
        </div>
        <div id="admin-section-messages" style="display:none">
          <div class="loader"><div class="spinner"></div></div>
        </div>
        <div id="admin-section-users" style="display:none">
          <div class="loader"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>
  {% endif %}

</div>

<!-- Лайтбокс -->
<div id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav" id="lb-prev" onclick="navLightbox(-1)">‹</button>
  <div class="lightbox-inner">
    <div id="lb-media"></div>
    <div class="lightbox-meta" id="lb-meta"></div>
  </div>
  <button class="lightbox-nav" id="lb-next" onclick="navLightbox(1)">›</button>
</div>

{% endif %}

<script>
// ── Авторизация ──────────────────────────────────────────────────────────────

function onTelegramAuth(user) {
  fetch('/api/auth', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(user),
  })
  .then(r => r.json())
  .then(d => { if (d.ok) location.reload(); })
  .catch(console.error);
}

function logout() {
  fetch('/api/logout', { method: 'POST' })
    .then(() => location.reload());
}

{% if user %}

// ── Вкладки ──────────────────────────────────────────────────────────────────

let refsLoaded  = false;
let trashLoaded = false;
let adminLoaded = false;

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));

  if (name === 'refs' && !refsLoaded) {
    refsLoaded = true;
    loadReferences();
  }
  if (name === 'trash' && !trashLoaded) {
    trashLoaded = true;
    loadTrash();
  }
  if (name === 'admin' && !adminLoaded) {
    adminLoaded = true;
    loadAdmin();
  }
}

// ── Медиафайлы: состояние фильтров ───────────────────────────────────────────

let allFiles   = [];
let activeType = 'all';
let activeArt  = 'all';
let lbIndex    = 0;
let lbFiles    = [];

fetch('/api/files')
  .then(r => r.json())
  .then(data => {
    allFiles = data.files;

    const artContainer = document.getElementById('articul-filters');
    data.articuls.forEach(art => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.dataset.articul = art;
      btn.textContent = art;
      btn.onclick = () => setArticul(btn);
      artContainer.appendChild(btn);
    });

    document.getElementById('app').style.display = 'block';
    render();
  })
  .catch(() => {
    document.getElementById('content').innerHTML =
      '<div class="empty"><h3>Ошибка загрузки</h3><p>Попробуйте обновить страницу.</p></div>';
  });

function setType(btn) {
  activeType = btn.dataset.type;
  document.querySelectorAll('#type-filters .chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setArticul(btn) {
  activeArt = btn.dataset.articul;
  document.querySelectorAll('#articul-filters .chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filtered() {
  return allFiles.filter(f => {
    if (activeType !== 'all' && f.type !== activeType) return false;
    if (activeArt  !== 'all' && f.articul !== activeArt)  return false;
    return true;
  });
}

function render() {
  const files = filtered();
  const content = document.getElementById('content');
  const stats   = document.getElementById('stats');

  const photos = files.filter(f => f.type === 'photo').length;
  const videos = files.filter(f => f.type === 'video').length;
  stats.textContent = files.length === 0 ? '' :
    `Показано: ${files.length} файл${plural(files.length, '', 'а', 'ов')}` +
    (photos ? ` · ${photos} фото` : '') +
    (videos ? ` · ${videos} видео` : '');

  if (files.length === 0) {
    content.innerHTML = `
      <div class="empty">
        <h3>Файлы не найдены</h3>
        <p>Попробуйте изменить фильтры или создайте фото в боте.</p>
      </div>`;
    return;
  }

  lbFiles = files;
  content.innerHTML = `<div class="grid">${files.map((f, i) => cardHTML(f, i)).join('')}</div>`;
}

function cardHTML(f, i) {
  const thumb = f.type === 'photo' ? `/thumb/${f.path}` : `/files/${f.path}`;
  const media = f.type === 'photo'
    ? `<img src="${thumb}" loading="lazy" alt="${f.articul}">`
    : `<video src="${thumb}" muted preload="none"></video>`;

  return `
    <div class="card" onclick="openLightbox(${i})">
      ${media}
      ${f.type === 'video' ? '<span class="badge-video">▶ видео</span>' : ''}
      <div class="card-overlay">
        <span class="card-articul">${f.articul}</span>
        <span class="card-name">${f.name}</span>
      </div>
    </div>`;
}

// ── Лайтбокс ─────────────────────────────────────────────────────────────────

function openLightbox(i) {
  lbIndex = i;
  showLightboxItem();
  document.getElementById('lightbox').classList.add('open');
  document.addEventListener('keydown', onKeyDown);
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lb-media').innerHTML = '';
  document.removeEventListener('keydown', onKeyDown);
}

function navLightbox(dir) {
  lbIndex = (lbIndex + dir + lbFiles.length) % lbFiles.length;
  showLightboxItem();
}

function showLightboxItem() {
  const f       = lbFiles[lbIndex];
  const fullSrc = `/files/${f.path}`;
  const mediaEl = document.getElementById('lb-media');
  const metaEl  = document.getElementById('lb-meta');

  if (f.type === 'photo') {
    mediaEl.innerHTML = `<img src="${fullSrc}" alt="${f.name}">`;
  } else {
    mediaEl.innerHTML = `<video src="${fullSrc}" controls autoplay loop></video>`;
  }

  metaEl.innerHTML = `<strong>${f.articul}</strong> · ${f.name} · ${fmtSize(f.size)}`;
  document.getElementById('lb-prev').style.display = lbFiles.length > 1 ? 'flex' : 'none';
  document.getElementById('lb-next').style.display = lbFiles.length > 1 ? 'flex' : 'none';
}

function onKeyDown(e) {
  if (e.key === 'Escape')       closeLightbox();
  if (e.key === 'ArrowLeft')    navLightbox(-1);
  if (e.key === 'ArrowRight')   navLightbox(1);
}

// ── Эталоны ──────────────────────────────────────────────────────────────────

function loadReferences() {
  Promise.all([
    fetch('/api/references').then(r => r.json()),
    fetch('/api/trash').then(r => r.json()),
  ])
  .then(([refsData, trashData]) => {
    renderReferences(refsData.references);
    // Показываем вкладку Корзина только если там что-то есть
    if (trashData.trash && trashData.trash.length > 0) {
      document.getElementById('tab-btn-trash').style.display = '';
    }
  })
  .catch(() => {
    document.getElementById('refs-content').innerHTML =
      '<div class="empty"><h3>Ошибка загрузки</h3><p>Попробуйте обновить страницу.</p></div>';
  });
}

function renderReferences(refs) {
  const container = document.getElementById('refs-content');

  if (!refs || refs.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <h3>Эталоны не найдены</h3>
        <p>Создайте эталон для артикула в боте.</p>
      </div>`;
    return;
  }

  container.innerHTML = `<div class="ref-list">${refs.map(refCardHTML).join('')}</div>`;
}

function refCardHTML(ref) {
  const origSrc = ref.orig_path ? `/files/${ref.orig_path}` : null;
  const refSrc  = ref.ref_path  ? `/files/${ref.ref_path}`  : null;

  const origImg = origSrc
    ? `<img src="${origSrc}" loading="lazy" alt="оригинал">`
    : `<div class="ref-photo-placeholder">нет фото</div>`;

  const refImg = refSrc
    ? `<img src="${refSrc}" loading="lazy" alt="эталон">`
    : `<div class="ref-photo-placeholder">нет эталона</div>`;

  const dateStr = ref.created_at
    ? new Date(ref.created_at).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' })
    : '';

  const fields = [
    { label: 'Название',    key: 'product_name',        multiline: false },
    { label: 'Цвет',        key: 'product_color',       multiline: false },
    { label: 'Материал',    key: 'product_material',    multiline: false },
    { label: 'Категория',   key: 'category',            multiline: false },
    { label: 'Описание',    key: 'product_description', multiline: true  },
  ];

  const fieldsHTML = fields.map(f => `
    <div class="ref-field-row">
      <span class="ref-field-label">${f.label}</span>
      <div
        class="ref-field-value"
        data-ref-id="${ref.id}"
        data-field="${f.key}"
        data-multiline="${f.multiline}"
        contenteditable="true"
        spellcheck="false"
        onkeydown="onFieldKeydown(event, this)"
        onblur="saveField(this)"
        onfocus="onFieldFocus(this)"
      >${escHtml(ref[f.key] || '')}</div>
    </div>
  `).join('');

  return `
    <div class="ref-card" id="ref-${ref.id}">
      <div class="ref-photos">
        <div class="ref-photo-wrap">
          <div class="ref-photo-label">Оригинал</div>
          ${origImg}
        </div>
        <div class="ref-photo-wrap">
          <div class="ref-photo-label">Эталон</div>
          ${refImg}
        </div>
      </div>
      <div class="ref-fields">
        <div class="ref-header">
          <span class="ref-articul">${escHtml(ref.articul)}</span>
          <span class="ref-number">эталон №${ref.reference_number}</span>
          <span class="ref-date">${dateStr}</span>
          <button class="ref-delete-btn" title="Удалить в корзину" onclick="deleteReference(${ref.id})">🗑</button>
        </div>
        ${fieldsHTML}
        <div class="ref-save-hint">Кликните на поле, чтобы редактировать. Enter или клик вне поля — сохранение.</div>
        <div class="ref-save-status" id="save-status-${ref.id}"></div>
      </div>
    </div>`;
}

function deleteReference(refId) {
  if (!confirm('Переместить эталон в корзину?\nОн будет удалён через 30 дней.')) return;

  fetch(`/api/references/${refId}`, { method: 'DELETE' })
    .then(r => {
      if (!r.ok) throw new Error();
      // Убираем карточку из списка
      const el = document.getElementById(`ref-${refId}`);
      if (el) el.remove();
      // Показываем вкладку Корзина и сбрасываем её кэш
      document.getElementById('tab-btn-trash').style.display = '';
      trashLoaded = false;
    })
    .catch(() => alert('Ошибка удаления. Попробуйте ещё раз.'));
}

// ── Корзина ───────────────────────────────────────────────────────────────────

function loadTrash() {
  fetch('/api/trash')
    .then(r => r.json())
    .then(data => renderTrash(data.trash))
    .catch(() => {
      document.getElementById('trash-content').innerHTML =
        '<div class="empty"><h3>Ошибка загрузки</h3><p>Попробуйте обновить страницу.</p></div>';
    });
}

function renderTrash(items) {
  const container = document.getElementById('trash-content');

  if (!items || items.length === 0) {
    document.getElementById('tab-btn-trash').style.display = 'none';
    container.innerHTML = `
      <div class="empty">
        <h3>Корзина пуста</h3>
        <p>Удалённые эталоны появятся здесь.</p>
      </div>`;
    return;
  }

  container.innerHTML = `<div class="ref-list">${items.map(trashCardHTML).join('')}</div>`;
}

function trashCardHTML(item) {
  const photo = item.ref_path
    ? `<img class="trash-photo" src="/files/${item.ref_path}" loading="lazy" alt="эталон">`
    : `<div class="trash-photo-placeholder"></div>`;

  const daysClass = item.days_left <= 7 ? '' : 'safe';
  const daysLabel = item.days_left === 0
    ? 'удаляется сегодня'
    : `удалится через ${item.days_left} дн.`;

  return `
    <div class="trash-card" id="trash-${item.id}">
      ${photo}
      <div class="trash-info">
        <div class="trash-articul">${escHtml(item.articul)} <span style="font-weight:400;font-size:13px;color:var(--muted)">эталон №${item.reference_number}</span></div>
        <div class="trash-name">${escHtml(item.product_name)}</div>
        <span class="trash-days ${daysClass}">${daysLabel}</span>
      </div>
      <button class="btn-restore" onclick="restoreReference(${item.id})">Восстановить</button>
      <button class="btn-purge"   onclick="purgeReference(${item.id})" title="Удалить навсегда">✕</button>
    </div>`;
}

function restoreReference(refId) {
  fetch(`/api/trash/${refId}/restore`, { method: 'POST' })
    .then(r => {
      if (!r.ok) throw new Error();
      const el = document.getElementById(`trash-${refId}`);
      if (el) el.remove();
      // Обновляем список эталонов
      refsLoaded = false;
      loadReferences();
      _hideTrashIfEmpty();
    })
    .catch(() => alert('Ошибка восстановления. Попробуйте ещё раз.'));
}

function purgeReference(refId) {
  if (!confirm('Удалить эталон навсегда?\nЭто действие нельзя отменить.')) return;

  fetch(`/api/trash/${refId}`, { method: 'DELETE' })
    .then(r => {
      if (!r.ok) throw new Error();
      const el = document.getElementById(`trash-${refId}`);
      if (el) el.remove();
      _hideTrashIfEmpty();
    })
    .catch(() => alert('Ошибка удаления. Попробуйте ещё раз.'));
}

function _hideTrashIfEmpty() {
  const remaining = document.querySelectorAll('[id^="trash-"]').length;
  if (remaining === 0) {
    document.getElementById('tab-btn-trash').style.display = 'none';
    switchTab('refs');
  }
}

// ── Редактирование полей ─────────────────────────────────────────────────────

function onFieldFocus(el) {
  el.classList.add('editing');
  // Сохраняем оригинальное значение для отмены
  el.dataset.original = el.textContent;
}

function onFieldKeydown(e, el) {
  const multiline = el.dataset.multiline === 'true';
  if (e.key === 'Enter' && !multiline) {
    e.preventDefault();
    el.blur();
  }
  if (e.key === 'Escape') {
    el.textContent = el.dataset.original || '';
    el.blur();
  }
}

function saveField(el) {
  el.classList.remove('editing');

  const refId   = el.dataset.refId;
  const field   = el.dataset.field;
  const value   = el.textContent.trim();
  const original = el.dataset.original || '';

  // Не отправляем если значение не изменилось
  if (value === original) return;

  const statusEl = document.getElementById(`save-status-${refId}`);

  fetch(`/api/references/${refId}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ [field]: value }),
  })
  .then(r => {
    if (!r.ok) throw new Error('error');
    statusEl.textContent = 'Сохранено';
    statusEl.className = 'ref-save-status ok';
    el.dataset.original = value;
    setTimeout(() => { statusEl.textContent = ''; statusEl.className = 'ref-save-status'; }, 2000);
  })
  .catch(() => {
    statusEl.textContent = 'Ошибка сохранения';
    statusEl.className = 'ref-save-status err';
    el.textContent = original;
  });
}

{% if is_admin %}

let _keysWithValue2    = new Set();
let _usersLoaded       = false;
let _messagesRendered  = false;
let _messageTemplates  = [];

function toggleAdminSidebar() {

}

const _adminSectionTitles = {
  prompts:  'Промпты',

function adminNav(section) {

function loadAdmin() {

    .then(r => r.json())
    .then(data => {

function renderAdmin(data) {
  // Разделяем шаблоны: msg_* → раздел Сообщения, остальные → Промпты
  const promptTpls  = data.templates.filter(t => !t.key.startsWith('msg_'));
  const messageTpls = data.templates.filter(t =>  t.key.startsWith('msg_'));

  // Сохраняем для ленивого рендера раздела Сообщения
  _messageTemplates = messageTpls;

  const container = document.getElementById('admin-section-prompts');

  const tplHTML   = promptTpls.map(tplCardHTML).join('');

      <h2>Списки элементов</h2>
      ${listsHTML}
      <div class="admin-invalidate">

function renderMessages(templates) {
  const container = document.getElementById('admin-section-messages');

  if (!templates || templates.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <h3>Сообщений пока нет</h3>
        <p>Мигрируйте первое сообщение через schema.sql — оно появится здесь автоматически.</p>
      </div>`;
    return;
  }

  const cardsHTML = templates.map(tplCardHTML).join('');

  container.innerHTML = `

        Тексты, которые бот отправляет пользователям. Имена <code style="font-size:12px;color:var(--accent)">{placeholder}</code> — контракт с кодом, переименовывать запрещено.

      </p>

        <span class="invalidate-hint">Изменения подхватываются ботом автоматически через ~10 сек.</span>
        <span id="invalidate-status-msg" style="font-size:12px"></span>

// ── Шаблоны ──

function tplCardHTML(tpl) {
  const isMsg       = tpl.key.startsWith('msg_');
  const placeholders = [...new Set((tpl.template.match(/\{[^}]+\}/g) || []))].join(' ');
  const bannerName  = tpl.banner || 'banner_default.png';

  const bannerBlock = isMsg ? `
    <div class="tpl-banner">
      <img class="tpl-banner-preview"
           id="banner-img-${escHtml(tpl.key)}"
           src="/assets/${encodeURIComponent(bannerName)}"
           alt="баннер"
           onerror="this.style.opacity='.25'">
      <div class="tpl-banner-meta">
        <span class="tpl-banner-name">${escHtml(bannerName)}</span>
        <label class="btn-replace-banner">
          Заменить баннер
          <input type="file" accept="image/png,image/jpeg" style="display:none"
            onchange="uploadBanner('${escHtml(tpl.key)}','${escHtml(bannerName)}',this)">
        </label>
        <div class="banner-upload-status" id="banner-status-${escHtml(tpl.key)}"></div>
      </div>
    </div>` : '';

  const sortBlock = isMsg ? `
    <label class="tpl-sort-label" title="Порядок отображения в списке">
      #
      <input type="number" class="tpl-sort-input"
        id="sort-${escHtml(tpl.key)}"
        value="${tpl.sort_order}"
        data-original="${tpl.sort_order}"
        min="0" step="10"
        onkeydown="if(event.key==='Enter'){this.blur()} if(event.key==='Escape'){this.value=this.dataset.original;this.blur()}"
        onblur="saveTplSortOrder('${escHtml(tpl.key)}', this)">
    </label>` : '';

  return `
    <div class="tpl-card">
      <div class="tpl-header">
        <span class="tpl-key">${escHtml(tpl.key)}</span>
        <span class="tpl-desc">${escHtml(tpl.description)}</span>
        ${sortBlock}
      </div>
      ${bannerBlock}
      ${placeholders ? `<div class="tpl-placeholders">Переменные: ${escHtml(placeholders)}</div>` : ''}
      <textarea
        class="tpl-textarea"
        id="tpl-${tpl.key}"
        data-original="${escHtml(tpl.template)}"
        oninput="onTplInput('${tpl.key}')"
      >${escHtml(tpl.template)}</textarea>
      <div class="tpl-footer">
        <button class="btn-save-tpl" id="btn-tpl-${tpl.key}" disabled onclick="saveTpl('${tpl.key}')">Сохранить</button>
        <span class="tpl-status" id="tpl-status-${tpl.key}"></span>
      </div>
    </div>`;
}

function onTplInput(key) {
  const ta  = document.getElementById(`tpl-${key}`);
  const btn = document.getElementById(`btn-tpl-${key}`);
  btn.disabled = ta.value.trim() === ta.dataset.original;
}

function saveTpl(key) {
  const ta  = document.getElementById(`tpl-${key}`);
  const btn = document.getElementById(`btn-tpl-${key}`);
  const st  = document.getElementById(`tpl-status-${key}`);
  const val = ta.value.trim();

  btn.disabled = true;
  fetch(`/api/admin/prompts/templates/${encodeURIComponent(key)}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ template: val }),
  })
  .then(r => { if (!r.ok) throw new Error(); return r.json(); })
  .then(() => {
    ta.dataset.original = val;
    st.textContent = 'Сохранено';
    st.className = 'tpl-status ok';
    setTimeout(() => { st.textContent = ''; st.className = 'tpl-status'; }, 2500);
  })
  .catch(() => {
    btn.disabled = false;
    st.textContent = 'Ошибка';
    st.className = 'tpl-status err';
  });
}

function saveTplSortOrder(key, input) {
  const val = parseInt(input.value, 10);
  if (isNaN(val) || val < 0) { input.value = input.dataset.original; return; }
  if (val === parseInt(input.dataset.original, 10)) return;

  fetch(`/api/admin/prompts/templates/${encodeURIComponent(key)}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sort_order: val }),
  })
  .then(r => { if (!r.ok) throw new Error(); return r.json(); })
  .then(() => {
    input.dataset.original = val;
    const tpl = _messageTemplates.find(t => t.key === key);
    if (tpl) tpl.sort_order = val;
    _messageTemplates.sort((a, b) => a.sort_order - b.sort_order || a.key.localeCompare(b.key));
    _messagesRendered = false;
    renderMessages(_messageTemplates);
    _messagesRendered = true;
  })
  .catch(() => { input.value = input.dataset.original; });
}

// ── Списки ──

function listGroupHTML(lk, items) {
  const hasV2  = _keysWithValue2.has(lk);
  const active = items.filter(i => i.is_active).length;

  const rows = items.map(item => listRowHTML(lk, item, hasV2)).join('');

  const v2Header = hasV2 ? `<th style="min-width:140px">value2</th>` : '';
  const addV2    = hasV2 ? `<input class="list-add-input" id="add-v2-${lk}" placeholder="value2 (доп.)" style="max-width:160px">` : '';

  return `
    <div class="list-group">
      <div class="list-group-header" onclick="toggleListGroup('${lk}')">
        <span class="list-group-key">${lk}</span>
        <span class="list-group-count">${active} / ${items.length} активных</span>
        <span class="list-group-chevron">▶</span>
      </div>
      <div class="list-group-body" id="list-body-${lk}">
        <table class="list-table">
          <thead><tr>
            <th>Активен</th>
            <th>value</th>
            ${v2Header}
            <th style="width:32px"></th>
          </tr></thead>
          <tbody id="list-rows-${lk}">${rows}</tbody>
        </table>
        <div class="list-add-row">
          <input class="list-add-input" id="add-val-${lk}" placeholder="Новый элемент (value)">
          ${addV2}
          <button class="btn-add-item" onclick="addListItem('${lk}')">+ Добавить</button>
        </div>
      </div>
    </div>`;
}

function listRowHTML(lk, item, hasV2) {
  const v2cell = hasV2
    ? `<td><input class="list-input" value="${escHtml(item.value2)}" onchange="updateItem(${item.id},{value2:this.value})"></td>`
    : '';
  return `
    <tr class="list-row${item.is_active ? '' : ' inactive'}" id="lrow-${item.id}">
      <td style="width:48px;text-align:center">
        <input type="checkbox" class="list-toggle" ${item.is_active ? 'checked' : ''}
          onchange="updateItem(${item.id},{is_active:this.checked})">
      </td>
      <td><input class="list-input" value="${escHtml(item.value)}" onchange="updateItem(${item.id},{value:this.value})"></td>
      ${v2cell}
      <td><button class="btn-del-item" onclick="deleteItem(${item.id},'${lk}')" title="Удалить">✕</button></td>
    </tr>`;
}

function toggleListGroup(lk) {
  const header = document.querySelector(`#list-body-${lk}`).previousElementSibling;
  const body   = document.getElementById(`list-body-${lk}`);
  header.classList.toggle('open');
  body.classList.toggle('open');
}

function updateItem(id, patch) {
  fetch(`/api/admin/prompts/lists/items/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(patch),
  })
  .then(r => { if (!r.ok) throw new Error(); })
  .then(() => {
    // Обновляем стиль строки если меняли is_active
    if ('is_active' in patch) {
      const row = document.getElementById(`lrow-${id}`);
      if (row) row.classList.toggle('inactive', !patch.is_active);
    }
  })
  .catch(() => alert('Ошибка сохранения.'));
}

function deleteItem(id, lk) {
  if (!confirm('Удалить элемент навсегда?')) return;
  fetch(`/api/admin/prompts/lists/items/${id}`, { method: 'DELETE' })
    .then(r => { if (!r.ok) throw new Error(); })
    .then(() => {
      const row = document.getElementById(`lrow-${id}`);
      if (row) row.remove();
    })
    .catch(() => alert('Ошибка удаления.'));
}

function addListItem(lk) {
  const valEl = document.getElementById(`add-val-${lk}`);
  const v2El  = document.getElementById(`add-v2-${lk}`);
  const value  = valEl.value.trim();
  const value2 = v2El ? v2El.value.trim() : '';

  if (!value) { valEl.focus(); return; }

  fetch('/api/admin/prompts/lists/items', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ list_key: lk, value, value2 }),
  })
  .then(r => { if (!r.ok) throw new Error(); return r.json(); })
  .then(data => {
    const hasV2 = _keysWithValue2.has(lk);
    const newRow = listRowHTML(lk, {
      id: data.id, value, value2, is_active: true, sort_order: 0,
    }, hasV2);
    document.getElementById(`list-rows-${lk}`).insertAdjacentHTML('beforeend', newRow);
    valEl.value = '';
    if (v2El) v2El.value = '';
  })
  .catch(() => alert('Ошибка добавления.'));
}

function uploadBanner(tplKey, bannerName, input) {
  const file = input.files[0];
  if (!file) return;

  const statusEl = document.getElementById(`banner-status-${tplKey}`);
  statusEl.textContent = 'Загружаем...';
  statusEl.className = 'banner-upload-status';

  const form = new FormData();
  form.append('file', file);

  fetch(`/api/admin/banners/${encodeURIComponent(bannerName)}`, {
    method: 'POST',
    body: form,
  })
  .then(r => { if (!r.ok) throw new Error(); return r.json(); })
  .then(() => {
    const img = document.getElementById(`banner-img-${tplKey}`);
    if (img) {
      img.style.opacity = '1';
      img.src = `/assets/${encodeURIComponent(bannerName)}?t=${Date.now()}`;
    }
    statusEl.textContent = 'Баннер обновлён';
    statusEl.className = 'banner-upload-status ok';
    setTimeout(() => { statusEl.textContent = ''; }, 3000);
    input.value = '';
  })
  .catch(() => {
    statusEl.textContent = 'Ошибка загрузки';
    statusEl.className = 'banner-upload-status err';
  });
}

function adminInvalidate() {
  fetch('/api/admin/prompts/invalidate', { method: 'POST' })
    .then(r => r.json())
    .then(() => {
      ['invalidate-status', 'invalidate-status-msg'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = 'Кэш сброшен — бот подхватит через ~10 сек';
        el.style.color = '#22c55e';
        setTimeout(() => { el.textContent = ''; }, 4000);
      });
    })
    .catch(() => {
      ['invalidate-status', 'invalidate-status-msg'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = 'Ошибка';
        el.style.color = '#ef4444';
      });
    });
}

function loadUsers() {
  fetch('/api/admin/users')
    .then(r => r.json())
    .then(data => renderUsers(data.users))
    .catch(() => {
      document.getElementById('admin-section-users').innerHTML =

function renderUsers(users) {
  const container = document.getElementById('admin-section-users');

  if (!users || users.length === 0) {
    container.innerHTML = '<div class="empty"><h3>Пользователи не найдены</h3></div>';
    return;
  }

  const rows = users.map(u => {
    const dateStr = u.created_at
      ? new Date(u.created_at).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' })
      : '—';
    const statusClass = u.is_registered ? 'reg' : 'unreg';
    const statusLabel = u.is_registered ? 'активен' : 'не зарег.';
    const username    = u.username ? '@' + escHtml(u.username) : '—';

    return `
      <tr id="urow-${u.user_id}">
        <td>${username}</td>
        <td class="user-id-cell">${u.user_id}</td>
        <td>
          <span
            class="balance-val"
            contenteditable="true"
            spellcheck="false"
            data-user-id="${u.user_id}"
            data-original="${u.balance}"
            onkeydown="onBalanceKeydown(event, this)"
            onblur="saveBalance(this)"
            onfocus="this.classList.add('editing'); this.dataset.original=this.textContent.trim()"
          >${u.balance}</span>
        </td>
        <td><span class="user-status ${statusClass}">${statusLabel}</span></td>
        <td style="color:var(--muted)">${dateStr}</td>
      </tr>`;
  }).join('');

  container.innerHTML = `
    <div class="users-section">
      <div class="users-search">
        <input
          class="users-search-input"
          type="text"
          placeholder="Поиск по нику или ID..."
          oninput="filterUsers(this.value)"
        >
      </div>
      <div class="users-table-wrap">
        <table class="users-table">
          <thead><tr>
            <th>Пользователь</th>
            <th>Telegram ID</th>
            <th>Баланс</th>
            <th>Статус</th>
            <th>Дата регистрации</th>
          </tr></thead>
          <tbody id="users-tbody">${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function filterUsers(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('#users-tbody tr').forEach(row => {
    row.style.display = !q || row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function onBalanceKeydown(e, el) {
  if (e.key === 'Enter')  { e.preventDefault(); el.blur(); return; }
  if (e.key === 'Escape') { el.textContent = el.dataset.original || '0'; el.blur(); return; }
  // Разрешаем только цифры, минус и навигационные клавиши
  if (!/[\d\-]/.test(e.key) && !['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Home','End'].includes(e.key)) {
    e.preventDefault();
  }
}

function saveBalance(el) {
  el.classList.remove('editing');
  const userId   = el.dataset.userId;
  const newVal   = el.textContent.trim();
  const original = el.dataset.original || '0';

  if (newVal === original) return;

  const balance = parseInt(newVal, 10);
  if (isNaN(balance)) { el.textContent = original; return; }

  fetch(`/api/admin/users/${userId}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ balance }),
  })
  .then(r => { if (!r.ok) throw new Error(); })
  .then(() => { el.dataset.original = String(balance); el.textContent = String(balance); })
  .catch(() => { el.textContent = original; alert('Ошибка сохранения баланса.'); });
}

// ── Вспомогалки ──────────────────────────────────────────────────────────────

function fmtSize(bytes) {
  if (bytes < 1024)       return bytes + ' B';
  if (bytes < 1024*1024)  return (bytes/1024).toFixed(0) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

function plural(n, one, few, many) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return one;
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return few;
  return many;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
